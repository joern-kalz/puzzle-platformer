<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust WASM Dynamic Image</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
        }

        canvas {
            max-width: 95vmin;
            max-height: 95vmin;
            border: 2px solid #0f3460;
            border-radius: 8px;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <script type="module">
        import init, { Game } from './pkg/puzzle_platformer.js';

        async function run() {
            const wasm = await init();

            const game = new Game();
            const width = game.get_width();
            const height = game.get_height();

            const canvas = document.getElementById('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.style.width = `${width * 2}px`;
            canvas.style.height = `${height * 2}px`;
            const ctx = canvas.getContext('2d');

            function render(timestamp) {
                game.update_frame(timestamp);

                const ptr = game.get_pixel_buffer_ptr();
                const pixels = new Uint8ClampedArray(wasm.memory.buffer, ptr, width * height * 4);
                const imageData = new ImageData(pixels, width, height);
                ctx.putImageData(imageData, 0, 0);

                requestAnimationFrame(render);
            }

            requestAnimationFrame(render);

            canvas.addEventListener('mousemove', (event) => {
                if (game.on_hover(...getPosition(event))) {
                    canvas.style.cursor = 'pointer';
                } else {
                    canvas.style.cursor = 'default';
                }
            });

            canvas.addEventListener('click', (event) => {
                game.on_click(...getPosition(event));
            });

            function getPosition(event) {
                const rect = canvas.getBoundingClientRect();
                const x = (event.clientX - rect.left) * (canvas.width / rect.width);
                const y = (event.clientY - rect.top) * (canvas.height / rect.height);
                return [x, y];
            }
        }

        run();
    </script>
</body>

</html>
